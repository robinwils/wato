name: Build

on:
  pull_request:
    branches:
    - main
  workflow_dispatch:
  schedule:
  - cron: '0 1 * * *'

jobs:
  job:
    name: ${{ matrix.os }}-${{ matrix.buildtype }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.os == 'ubuntu-24.04' && 'robinwils/wato-build-ubuntu-24.04' || null }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2022]
        buildtype: [debug, release]
        include:
          - os: ubuntu-24.04
            compiler: gcc
            preset: unixlike
          - os: macos-15
            compiler: clang
            preset: unixlike
          - os: windows-2022
            compiler: msvc
            preset: windows
    env:
      # Indicates the location of the vcpkg as a Git submodule of the project repository.
      # Not using "VCPKG_ROOT" because a variable with the same name is defined in the VS's
      # Developer Command Prompt environment in VS 2022 17.6, which would override this one
      # if it had the same name.
      _VCPKG_: ${{ github.workspace }}/vcpkg
      # Tells vcpkg where binary packages are stored.
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg/bincache
      # Let's use GitHub Action cache as storage for the vcpkg Binary Caching feature.
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run:
          # for libsodium
          brew install autoconf automake libtool
      - name: Setup vcpkg caching
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: "Create directory '${{ env.VCPKG_DEFAULT_BINARY_CACHE }}'"
        run: mkdir -p $VCPKG_DEFAULT_BINARY_CACHE
        shell: bash

      # Setup the build machine with the most recent versions of CMake and Ninja. Both are cached if not already: on subsequent runs both will be quickly restored from GitHub cache service.
      - uses: lukka/get-cmake@latest
        with:
          # debian testing version as of 28/06/2025
          cmakeVersion: 3.31.6

      # Restore vcpkg from the GitHub Action cache service. Note that packages are restored by vcpkg's binary caching
      # when it is being run afterwards by CMake.
      - name: Restore vcpkg
        uses: actions/cache@v4
        with:
          # The first path is the location of vcpkg: it contains the vcpkg executable and data files, as long as the
          # built package archives (aka binary cache) which are located by VCPKG_DEFAULT_BINARY_CACHE env var.
          # The other paths starting with '!' are exclusions: they contain termporary files generated during the build of the installed packages.
          path: |
            ${{ env._VCPKG_ }}
            !${{ env._VCPKG_ }}/buildtrees
            !${{ env._VCPKG_ }}/packages
            !${{ env._VCPKG_ }}/downloads
            !${{ env._VCPKG_ }}/installed
          # The key is composed in a way that it gets properly invalidated whenever a different version of vcpkg is being used.
          key: |
            ${{ hashFiles( '.git/modules/vcpkg/HEAD' )}}

      - name: Restore FetchContent build cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/out/build/*/_deps
          key: ${{ hashFiles('CMakeLists.txt', 'cmake/*', 'vcpkg.json') }}

      # On Windows runners, let's ensure to have the Developer Command Prompt environment setup correctly.
      # As used here the Developer Command Prompt created is targeting x64 and using the default the Windows SDK.
      # As stated in the readme: Supports Windows. Does nothing on Linux and macOS.
      - uses: ilammy/msvc-dev-cmd@v1

      - name: Generate Font Header files (Unix)
        if: runner.os != 'Windows'
        run: |
          cd deps/iconfontcppheaders/
          python3 -m venv watovenv
          watovenv/bin/pip install pyyaml requests
          watovenv/bin/python GenerateIconFontCppHeaders.py --ttf2headerC

      #. .\watovenv\Scripts\activate.ps1
      - name: Generate Font Header files (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cd deps\iconfontcppheaders
          pip install pyyaml requests
          python GenerateIconFontCppHeaders.py --ttf2headerC

      # Run CMake to generate Ninja project files, using the vcpkg's toolchain file to resolve and install
      # the dependencies as specified in vcpkg.json. Note that the vcpkg's toolchain is specified
      # in the CMakePresets.json file.
      # This step also runs vcpkg with Binary Caching leveraging GitHub Action cache to
      # store the built packages artifacts.
      - name: Restore from cache the dependencies and generate project files
        run: |
          cmake --preset ${{ matrix.preset }}-${{ matrix.compiler }}-${{ matrix.buildtype }} .

      - name: Build
        run: |
          cmake --build out/build/${{ matrix.preset }}-${{ matrix.compiler }}-${{ matrix.buildtype }}

       # Test the whole project with CTest, again Release configuration only.
      - name: Test
        run: |
          ctest
